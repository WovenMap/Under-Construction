<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WovenMap — logo explorations</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Inter:wght@200;300;400;500&family=Inter+Tight:wght@200;300;400;500&family=IBM+Plex+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <style>
      :root {
        --paper: #f6f1e8;
        --paper-2: #ece5d6;
        --ink: #1f2630;
        --ink-soft: #4a5260;
        --accent: #c4673a;
        --rule: rgba(31, 38, 48, 0.12);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--paper-2);
        color: var(--ink);
        font-family: "Inter Tight", system-ui, sans-serif;
      }
      .meta {
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 11px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }
      .label {
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 10.5px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }
      .rule {
        height: 1px;
        background: var(--rule);
        width: 100%;
      }
      .card {
        background: var(--paper);
        border: 1px solid var(--rule);
        height: 100%;
        box-sizing: border-box;
      }
    </style>

    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="tweaks-panel.jsx"></script>
    <script type="text/babel" src="marks.jsx"></script>
    <script type="text/babel" src="wordmark.jsx"></script>
    <script type="text/babel" src="app.jsx"></script>
  </head>
  <body>
    <template id="__bundler_thumbnail">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
        <rect width="200" height="200" fill="#0e1729"/>
        <g stroke="#c9a16a" stroke-width="2" stroke-linecap="round" fill="none">
          <path d="M 100 16 C 96 50, 96 70, 100 86"/>
          <path d="M 100 184 C 104 150, 104 130, 100 114"/>
          <path d="M 16 100 C 50 104, 70 104, 86 100"/>
          <path d="M 184 100 C 150 96, 130 96, 114 100"/>
        </g>
        <g fill="#c9a16a">
          <circle cx="100" cy="16" r="4"/><circle cx="100" cy="184" r="4"/>
          <circle cx="16" cy="100" r="4"/><circle cx="184" cy="100" r="4"/>
        </g>
        <circle cx="100" cy="100" r="11" stroke="#c9a16a" stroke-width="1.4" fill="none"/>
        <circle cx="100" cy="100" r="2" fill="#c9a16a"/>
      </svg>
    </template>
    <div id="root"></div>
  </body>
</html>
